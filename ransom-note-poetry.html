    gap: 12px;

.word {

    background: #fffdf5;

    border: 1px solid #c7bca8;

    padding: 12px 15px;

    font-family: "Times New Roman", serif;

    font-size: 1.2rem;

    box-shadow: 2px 3px 5px rgba(0,0,0,.15);

    transition: .2s;

}


.word:hover {

    transform: scale(1.1) rotate(0deg);

}

<body>


<header class="site-header">


<img

>


<h1>
📚 UFV Literature Club
</h1>


<p>
Creative Writing Prompt Hub
</p>


</header>





<main class="generator-page">


<div class="paper-card">


<a class="back-button" href="index.html">
← Back to Prompt Hub
</a>




<h2 class="generator-title">
✂️ Ransom Note Poetry
</h2>



<p class="subtitle">
Create poetry from stolen words. (please note this generator is still a work in progress, it is not 100% complete, and may not have a lot of words! thank you for understanding)
</p>





<div class="results ransom-board" id="words">

</div>




<button onclick="generate()">
✂️ Steal Words
</button>




</div>


</main>





<footer>

UFV Literature Club ✧

</footer>





<script>

"yet",
"still",

"then",

const wordPool = [

/* Poetic */

"moonlight",

"flower",

"leaf",
"river",
"lake",
"wave",
"shore",
"sand",
"mountain",

"snow",

/* Fantasy */

"spell",
"magic",

"curse",
"fairy",
"monster",

function randomItem(array){

return array[Math.floor(Math.random()*array.length)];

}





function generate(){


let chosen = [...glueWords];



while(chosen.length < 20){

chosen.push(randomItem(wordPool));

}




chosen =
chosen
.sort(() => Math.random() - 0.5)
.slice(0,20);





const container =
document.getElementById("words");



container.innerHTML = "";





chosen.forEach(word => {


let piece =
document.createElement("div");



piece.className = "word";



piece.textContent = word;



piece.style.transform =
`rotate(${Math.floor(Math.random()*10)-5}deg)`;



container.appendChild(piece);



});


}



generate();



</script>
