<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crossover Fiction Roulette | UFV Literature Club</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="site-header">

    <img
        src="https://i.imgur.com/nVopjPV.png"
        alt="UFV Literature Club Logo"
        class="club-logo"
    >

    <h1>📚 UFV Literature Club</h1>

    <p>Creative Writing Prompt Hub</p>

</header>



<main class="generator-page">


<div class="paper-card">


    <a class="back-button" href="index.html">
        ← Back to Prompt Hub
    </a>


    <h2 class="generator-title">
        🎲 Crossover Fiction
    </h2>


    <p class="subtitle">
        Mash two worlds together and create your next fanfiction idea!
    </p>



    <div class="results" id="result">

        Your crossover will appear here...

    </div>



    <button onclick="generate()">
        🎲 Spin!
    </button>



    <hr>



    <h3 class="generator-title">
        Add Your Own Fandom
    </h3>


    <p class="subtitle">
        Add a fandom to the roulette wheel!
    </p>



    <input 
        type="text"
        id="newFandom"
        placeholder="Type fandom and press Enter"
        onkeypress="addFandom(event)"
    >



</div>


</main>



<footer>

    UFV Literature Club ✧

</footer>



<script>


let fandoms = [

"Harry Potter",
"Percy Jackson / Heroes of Olympus",
"The Hunger Games",

"Star Wars",

"Bridgerton",
"Fortnite",

"The Sims",
"Zelda",
"Pokémon Games",
"League of Legends",
"Hollow Knight",
"Undertale / Deltarune",
"Roblox",
"Among Us",
"Super Smash Bros",
"Stardew Valley",
"Shrek",
"Disney Princesses",
"Sonic the Hedgehog",
"Creepypasta / Slenderman",
"FNaF (Five Nights at Freddy’s)",
"SpongeBob",
"Rick and Morty",
"JoJo’s Bizarre Adventure",
"Death Note",
"Black Clover",

"Chainsaw Man",
"Bluey",
"Amphibia",
"Invader Zim",
"Regular Show",
"Teen Titans",
"Young Justice",
"Powerpuff Girls",
"Kim Possible",
"Looney Tunes",
"Tom & Jerry",
"Over the Garden Wall",
"Persona 5",
"Fire Emblem",
"Final Fantasy",
"Kingdom Hearts",
"Splatoon",
"Metroid",
"Super Mario",
"Donkey Kong",
"Kirby",
"Pac-Man",
"Plants vs Zombies",
"Baldi’s Basics",
"Bendy and the Ink Machine",
"Genshin Impact",

"Digimon",
"Bakugan",
"Ben 10",
"Power Rangers",
"Voltron",
"Teenage Mutant Ninja Turtles",
"Cyberpunk 2077"

];



function generate(){

    if(fandoms.length < 2){

        document.getElementById("result").textContent =
        "Add more fandoms first!";

        return;

    }


    let f1 =
    fandoms[Math.floor(Math.random() * fandoms.length)];


    let f2 =
    fandoms[Math.floor(Math.random() * fandoms.length)];



    while(f1 === f2){

        f2 =
        fandoms[Math.floor(Math.random() * fandoms.length)];

    }



    document.getElementById("result").textContent =
    f1 + " × " + f2;

}




function addFandom(event){

    if(event.key === "Enter"){


        let input =
        document.getElementById("newFandom").value.trim();



        if(input && !fandoms.includes(input)){


            fandoms.push(input);


            document.getElementById("newFandom").value = "";


            alert(input + " added!");

        }


        else if(fandoms.includes(input)){


            alert("That fandom is already in the list!");

        }

    }

}


</script>


</body>

</html>
