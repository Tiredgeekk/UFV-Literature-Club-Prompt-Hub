<head>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="site-header">


<img
src="https://cdn.discordapp.com/attachments/1294886341963677728/1524570040631034037/Untitled53_20260708171657.png?ex=6a5039fe&is=6a4ee87e&hm=3ece5e698c0c7fd5303b6766d2f9d08f1aee693be7d96fcb47470c257fa76b8d&"
alt="UFV Literature Club Logo"
class="club-logo"
>


<h1>
📚 UFV Literature Club
</h1>


<p>
Creative Writing Prompt Hub
</p>


</header>




<main class="generator-page">


<div class="paper-card">


<a class="back-button" href="index.html">
← Back to Prompt Hub
</a>



<h2 class="generator-title">
✂️ Ransom Note Poetry
</h2>



<p class="subtitle">
Steal some words. Make something beautiful.
</p>




<div class="results word-container" id="wordContainer">


<p>
Your stolen words will appear here...
</p>


</div>





<button onclick="stealWords()">
🖤 Steal Words
</button>




</div>


</main>





<footer>

UFV Literature Club ✧

</footer>





<script>


const words = [


/* Connector Words */

"the",
"a",
"and",
"but",
"because",
"when",
"where",
"she",
"he",
"they",
"I",
"you",
"my",
"your",
"with",
"without",
"before",
"after",
"until",


/* Normal Words */

"house",
"door",
"window",
"street",
"rain",
"book",
"coffee",
"garden",
"flower",
"river",
"night",
"paper",
"letter",
"music",
"shadow",
"tree",
"ocean",


/* Emotional Words */

"lonely",
"forgotten",
"fragile",
"beautiful",
"broken",
"quiet",
"endless",
"restless",
"gentle",
"lost",
"hope",
"memory",
"dream",
"fear",
"wonder",


/* Sad/Dark Words */

"ghost",
"grief",
"goodbye",
"ashes",
"silence",
"regret",
"empty",
"haunted",
"shadow",
"echo",
"secret",
"ruin",


/* Funny Words */

"goblin",
"pickle",
"toaster",
"raccoon",
"spaghetti",
"banana",
"dramatic",
"cursed",
"cowboy",
"microwave",
"screaming",


/* Romantic Words */

"kiss",
"touch",
"heartbeat",
"warmth",
"desire",
"secret",
"whisper",
"blush",
"hunger",
"forever",
"temptation",


/* Strange Poetry Words */

"velvet",
"moon",
"thunder",
"glass",
"purple",
"clock",
"stars",
"feather",
"candle",
"storm",
"midnight",
"velvet"

];





function randomWord(){

return words[
Math.floor(Math.random()*words.length)
];

}




function stealWords(){


const container =
document.getElementById("wordContainer");



container.innerHTML = "";



let stolen = [];



while(stolen.length < 20){


let word = randomWord();



if(!stolen.includes(word)){

stolen.push(word);

}


}




stolen.forEach(word=>{


let piece =
document.createElement("span");


piece.className =
"word-piece";


piece.textContent =
word;



container.appendChild(piece);


});


}



</script>



</body>
